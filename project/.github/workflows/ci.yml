name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ─── Gate determinístico: lint (inclui complexity), typecheck e build ────────
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint (inclui gate de complexidade ciclomática)
        run: npm run lint
      - name: Testes unitários (helpers puros)
        run: npm run test:unit
      - name: Typecheck + build
        run: npm run build
        env:
          # Build não executa o código; placeholders bastam para o bundle do Vite.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}

  # ─── E2E Playwright (opcional) ───────────────────────────────────────────────
  # Ative criando a Repository Variable RUN_E2E=true e os Secrets:
  #   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY,
  #   PLAYWRIGHT_VENDEDOR_EMAIL/PASS, PLAYWRIGHT_DIRETOR_EMAIL/PASS
  e2e:
    runs-on: ubuntu-latest
    if: ${{ vars.RUN_E2E == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Instalar Chromium + libs de SO
        run: npx playwright install --with-deps chromium
      - name: Rodar suíte E2E
        run: npm test
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          PLAYWRIGHT_VENDEDOR_EMAIL: ${{ secrets.PLAYWRIGHT_VENDEDOR_EMAIL }}
          PLAYWRIGHT_VENDEDOR_PASS: ${{ secrets.PLAYWRIGHT_VENDEDOR_PASS }}
          PLAYWRIGHT_DIRETOR_EMAIL: ${{ secrets.PLAYWRIGHT_DIRETOR_EMAIL }}
          PLAYWRIGHT_DIRETOR_PASS: ${{ secrets.PLAYWRIGHT_DIRETOR_PASS }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
