name: CI
# Pipeline: quality (lint+complexity, unit, build) + e2e (Playwright, opcional via RUN_E2E)
# O app vive em project/ — todos os steps de shell rodam com working-directory: project.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    working-directory: project

jobs:
  # ─── Gate determinístico: lint (inclui complexity), typecheck e build ────────
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: project/package-lock.json
      - run: npm ci
      - name: Lint (inclui gate de complexidade ciclomática)
        run: npm run lint
      - name: Testes unitários (helpers puros)
        run: npm run test:unit
      - name: Typecheck + build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}

  # ─── E2E Playwright (opcional) ───────────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    if: ${{ vars.RUN_E2E == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: project/package-lock.json
      - run: npm ci
      - name: Instalar Chromium + libs de SO
        run: npx playwright install --with-deps chromium
      - name: Rodar suíte E2E
        run: npm test
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          PLAYWRIGHT_VENDEDOR_EMAIL: ${{ secrets.PLAYWRIGHT_VENDEDOR_EMAIL }}
          PLAYWRIGHT_VENDEDOR_PASS: ${{ secrets.PLAYWRIGHT_VENDEDOR_PASS }}
          PLAYWRIGHT_DIRETOR_EMAIL: ${{ secrets.PLAYWRIGHT_DIRETOR_EMAIL }}
          PLAYWRIGHT_DIRETOR_PASS: ${{ secrets.PLAYWRIGHT_DIRETOR_PASS }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: project/playwright-report/
          retention-days: 14
